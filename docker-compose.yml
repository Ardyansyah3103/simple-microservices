services:
  user-service:
    build: ./user-service
    container_name: user-service
    ports:
      - "8001:8001"

  product-service:
    build: ./product-service
    container_name: product-service
    ports:
      - "8002:8002"

  order-service:
    build: ./order-service
    container_name: order-service
    ports:
      - "8003:8003"
    depends_on:
      - user-service
      - product-service